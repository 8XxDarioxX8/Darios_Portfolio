<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #F7F9FC; --surface: #FFFFFF; --border: #E4EAF4;
            --text: #2F3A4A; --text2: #6B7A99; --text3: #A8B4CC;
            --accent: #5B8DEF; --accent-bg: #EBF2FF; --accent-soft: #A9C9FF;
            --green: #2BB580; --red: #E05C7A;
            --shadow: 0 4px 24px rgba(47,58,74,0.10);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .auth-wrap {
            width: 100%;
            max-width: 400px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo-mark {
            width: 48px; height: 48px;
            background: var(--accent);
            color: #fff;
            font-size: 20px; font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(91,141,239,0.35);
            margin-bottom: 12px;
        }

        .auth-logo-title {
            font-size: 22px; font-weight: 700;
            color: var(--text); letter-spacing: -0.02em;
        }

        .auth-logo-sub {
            font-family: 'DM Mono', monospace;
            font-size: 10px; color: var(--text3);
            letter-spacing: 0.1em; text-transform: uppercase;
            margin-top: 2px;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .auth-tab {
            flex: 1; padding: 14px;
            text-align: center;
            font-size: 13px; font-weight: 600;
            color: var(--text2);
            cursor: pointer;
            background: var(--bg);
            border: none;
            transition: all 0.15s;
        }

        .auth-tab.active {
            background: var(--surface);
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            margin-bottom: -1px;
        }

        .auth-form { padding: 28px; display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px; font-weight: 600;
            color: var(--text3); letter-spacing: 0.05em;
            text-transform: uppercase; margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            padding: 10px 13px;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(91,141,239,0.1);
        }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px; font-weight: 600;
            padding: 12px;
            cursor: pointer;
            margin-top: 4px;
            transition: all 0.15s;
            box-shadow: 0 2px 10px rgba(91,141,239,0.25);
        }

        .btn-primary:hover { background: #4A7DE0; box-shadow: 0 4px 16px rgba(91,141,239,0.4); }

        .auth-error {
            background: #FEF0F4; border: 1px solid #F6C1CF;
            color: #E05C7A; border-radius: 8px;
            padding: 10px 13px; font-size: 13px;
            margin-bottom: 16px; display: none;
        }

        .auth-error.show { display: block; }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-logo">
            <div class="auth-logo-mark">P</div>
            <div class="auth-logo-title">Portfolio Tracker</div>
            <div class="auth-logo-sub">Dein persönliches Dashboard</div>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Anmelden</button>
                <button class="auth-tab" onclick="switchTab('register')">Registrieren</button>
            </div>

            <!-- Login -->
            <div class="auth-form active" id="form-login">
                <div class="auth-error" id="login-error"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="dein-username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button class="btn-primary" onclick="doLogin()">Anmelden</button>
            </div>

            <!-- Register -->
            <div class="auth-form" id="form-register">
                <div class="auth-error" id="register-error"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="dein-username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="reg-password" placeholder="Mind. 6 Zeichen" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Passwort wiederholen</label>
                    <input type="password" id="reg-password2" placeholder="••••••••" autocomplete="new-password">
                </div>
                <button class="btn-primary" onclick="doRegister()">Konto erstellen</button>
            </div>
        </div>
    </div>

    <script>
        // Enter-Taste
        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            if (document.getElementById('form-login').classList.contains('active')) doLogin();
            else doRegister();
        });

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0) === (tab === 'login'));
            });
            document.getElementById('form-login').classList.toggle('active', tab === 'login');
            document.getElementById('form-register').classList.toggle('active', tab === 'register');
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError(id) {
            document.getElementById(id).classList.remove('show');
        }

        async function doLogin() {
            hideError('login-error');
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) { showError('login-error', 'Bitte alle Felder ausfüllen'); return; }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    // Token für Multi-Profile speichern
                    if (data.token) {
                        const profiles = JSON.parse(localStorage.getItem('dario_profiles') || '[]');
                        if (!profiles.find(p => p.userId === data.user_id)) {
                            profiles.push({ username: data.username, token: data.token, userId: data.user_id });
                            localStorage.setItem('dario_profiles', JSON.stringify(profiles));
                        }
                    }
                    window.location.href = '/';
                } else {
                    showError('login-error', data.error || 'Fehler beim Anmelden');
                }
            } catch (e) {
                showError('login-error', 'Verbindungsfehler');
            }
        }

        async function doRegister() {
            hideError('register-error');
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const password2 = document.getElementById('reg-password2').value;

            if (!username || !password) { showError('register-error', 'Bitte alle Felder ausfüllen'); return; }
            if (password !== password2) { showError('register-error', 'Passwörter stimmen nicht überein'); return; }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    if (data.token) {
                        const profiles = JSON.parse(localStorage.getItem('dario_profiles') || '[]');
                        if (!profiles.find(p => p.userId === data.user_id)) {
                            profiles.push({ username: data.username, token: data.token, userId: data.user_id });
                            localStorage.setItem('dario_profiles', JSON.stringify(profiles));
                        }
                    }
                    window.location.href = '/';
                } else {
                    showError('register-error', data.error || 'Fehler bei der Registrierung');
                }
            } catch (e) {
                showError('register-error', 'Verbindungsfehler');
            }
        }
    </script>
</body>
</html>
